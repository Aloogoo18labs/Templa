<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Templa – YangGo AI Training Registry</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161a22;
      --surface2: #1c2129;
      --border: #2a3140;
      --text: #e6e9ef;
      --textMuted: #8b92a4;
      --accent: #5b8def;
      --accentHover: #7aa3f5;
      --success: #4ade80;
      --warning: #facc15;
      --error: #f87171;
      --radius: 10px;
      --font: 'DM Sans', system-ui, sans-serif;
      --fontMono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accentHover); text-decoration: underline; }
    code, .mono { font-family: var(--fontMono); font-size: 0.9em; }

    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .app-header h1 { font-size: 1.5rem; font-weight: 600; }
    .app-header nav { display: flex; gap: 1rem; align-items: center; }
    .app-header nav button, .app-header nav a {
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .app-header nav button:hover, .app-header nav a:hover {
      background: var(--border);
      color: var(--text);
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.15rem; margin-bottom: 1rem; color: var(--text); }
    .card h3 { font-size: 1rem; margin: 1rem 0 0.5rem; color: var(--textMuted); }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
    }
    .stat-box .value { font-size: 1.75rem; font-weight: 700; color: var(--accent); }
    .stat-box .label { font-size: 0.8rem; color: var(--textMuted); margin-top: 0.25rem; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--textMuted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
    tr:hover td { background: var(--surface2); }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-tier-1 { background: #1e3a5f; color: #93c5fd; }
    .badge-tier-2 { background: #1e4620; color: #86efac; }
    .badge-tier-3 { background: #422006; color: #fcd34d; }
    .badge-tier-4 { background: #4c1d95; color: #c4b5fd; }
    .badge-final { background: #065f46; color: #6ee7b7; }
    .badge-draft { background: #374151; color: #9ca3af; }
    .badge-quorum { background: #166534; color: #86efac; }

    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    label { display: block; margin-bottom: 0.35rem; color: var(--textMuted); font-size: 0.85rem; }
    .form-group { margin-bottom: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius);
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accentHover); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-success { background: var(--success); color: #0d0f14; }
    .btn-danger { background: var(--error); color: #fff; }

    .tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .tabs button {
      padding: 0.75rem 1.25rem;
      background: none;
      border: none;
      color: var(--textMuted);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tabs button:hover { color: var(--text); }
    .tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

    .panel { display: none; }
    .panel.active { display: block; }

    .hash { font-family: var(--fontMono); font-size: 0.8rem; word-break: break-all; color: var(--textMuted); }
    .address { font-family: var(--fontMono); font-size: 0.85rem; }

    .empty-state { text-align: center; padding: 3rem; color: var(--textMuted); }
    .loading { text-align: center; padding: 2rem; color: var(--textMuted); }
    .error-msg { background: rgba(248,113,113,0.15); border: 1px solid var(--error); color: var(--error); padding: 0.75rem; border-radius: var(--radius); margin-bottom: 1rem; }
    .success-msg { background: rgba(74,222,128,0.15); border: 1px solid var(--success); color: var(--success); padding: 0.75rem; border-radius: var(--radius); margin-bottom: 1rem; }

    .run-detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .run-detail-item { background: var(--surface2); padding: 1rem; border-radius: var(--radius); }
    .run-detail-item .k { font-size: 0.75rem; color: var(--textMuted); }
    .run-detail-item .v { font-size: 1rem; margin-top: 0.25rem; }

    footer { text-align: center; padding: 2rem; color: var(--textMuted); font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 3rem; }

    .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mb-2 { margin-bottom: 1rem; }
    .text-muted { color: var(--textMuted); }
    .text-small { font-size: 0.85rem; }
    ul.plain { list-style: none; margin: 0; padding: 0; }
    .progress-bar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .progress-bar .fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.2s; }
    .tooltip { position: relative; }
    .tooltip:hover::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 0; padding: 0.35rem 0.5rem; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.8rem; white-space: nowrap; z-index: 10; }
    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
      .app-header { padding: 1rem; }
      .container { padding: 1rem; }
    }
    @media print {
      .app-header nav, .tabs, .btn, .no-print { display: none !important; }
      .card { break-inside: avoid; }
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .border-left-accent { border-left: 3px solid var(--accent); padding-left: 1rem; }
    .code-block { background: var(--surface2); padding: 1rem; border-radius: var(--radius); font-family: var(--fontMono); font-size: 0.85rem; overflow-x: auto; }
    .pill { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.8rem; background: var(--surface2); color: var(--textMuted); }
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
    .flex { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .gap-1 { gap: 0.5rem; }
    .gap-2 { gap: 1rem; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .w-full { width: 100%; }
    .max-w-md { max-width: 28rem; }
    .opacity-75 { opacity: 0.75; }
    .cursor-pointer { cursor: pointer; }
    .select-none { user-select: none; }
